<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slovenian Genealogical Index</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Slovenian Genealogical Index</h1>
        <nav id="top-nav">
          <div class="nav-title">
            <a href="/">Slovenian Genealogical Index</a>
          </div>
          <div class="nav-center-buttons">
            <button class="tab-btn active" data-target="tab-general">Search</button>
            <button class="tab-btn" data-target="tab-advanced">Advanced Search</button>
            <button class="tab-btn" data-target="tab-contributors">Contributors</button>
          </div>
          <button class="hamburger-btn">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </nav>
      </header>

      <div class="content-area">
        <aside id="sidebar">
          <div id="general-search-sidebar" class="sidebar-section active">
            <div class="search-box">
              <input type="text" id="general-query" placeholder="Search all fields (e.g., name, place, date)..." />
              <button id="btn-general-search">Search</button>
            </div>
          </div>
          <div id="advanced-search-sidebar" class="sidebar-section">
            <div class="search-box" id="adv-search-controls">
              <!-- Controls injected by JS -->
            </div>
          </div>
        </aside>

        <main id="main-content">
          <div id="loading" class="loading">Loading genealogical data...</div>

          <section id="tab-general" class="tab-content active">
            <div id="general-results" class="results-container" style="display: none;">
              <h2>Births (<span id="count-general-births">0</span>)</h2>
              <div class="table-responsive" id="table-general-births"></div>
              <h2>Families (<span id="count-general-families">0</span>)</h2>
              <div class="table-responsive" id="table-general-families"></div>
            </div>
          </section>

          <section id="tab-advanced" class="tab-content">
            <div id="advanced-results" class="results-container" style="display: none;">
              <h2 id="adv-results-title">Results (<span id="count-adv-results">0</span>)</h2>
              <div class="table-responsive" id="table-adv-results"></div>
            </div>
          </section>

          <section id="tab-contributors" class="tab-content">
            <div class="table-responsive" id="table-contributors"></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
