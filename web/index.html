<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slovenian Genealogical Index</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Slovenian Genealogical Index</h1>
        <nav id="top-nav">
          <div class="nav-title">
            <a href="/" data-i18n="site_title">Slovenian Genealogical Index</a>
          </div>
          <div class="header-nav">
            <button class="tab-btn active" data-target="tab-general" data-i18n="tab_search">Search</button>
            <button class="tab-btn" data-target="tab-advanced" data-i18n="tab_advanced">Advanced Search</button>
            <button class="tab-btn" data-target="tab-contributors" data-i18n="tab_contributors">Contributors</button>
          </div>
          <div class="lang-switcher" id="lang-switcher">
            <button class="lang-toggle" id="lang-toggle" aria-label="Select language">
              <span class="lang-flag">🇬🇧</span>
              <span class="lang-code">EN</span>
              <span class="lang-arrow">▾</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
              <button class="lang-option" data-lang="en">🇬🇧 EN</button>
              <button class="lang-option" data-lang="sl">🇸🇮 SL</button>
            </div>
          </div>
          <button class="hamburger-btn" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </nav>
      </header>

      <div class="content-area">
        <main id="main-content">
          <div id="loading" class="loading" data-i18n="loading">Loading genealogical data...</div>

          <section id="tab-general" class="tab-content active">
            <div id="intro-general" class="intro-text"></div>
            <div id="general-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_births">Births</span> (<span id="count-general-births">0</span>)</h2>
              <div class="table-responsive" id="table-general-births"></div>
              <h2><span data-i18n="results_families">Families</span> (<span id="count-general-families">0</span>)</h2>
              <div class="table-responsive" id="table-general-families"></div>
            </div>
          </section>

          <section id="tab-advanced" class="tab-content">
            <div id="intro-advanced" class="intro-text"></div>
            <div id="advanced-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_title">Results</span> (<span id="count-adv-results">0</span>)</h2>
              <div class="table-responsive" id="table-adv-results"></div>
            </div>
          </section>

          <section id="tab-contributors" class="tab-content">
            <div class="table-responsive" id="table-contributors"></div>
          </section>
        </main>

        <aside id="sidebar" class="open">
          <div class="sidebar-nav">
            <button class="tab-btn active" data-target="tab-general" data-i18n="tab_search">Search</button>
            <button class="tab-btn" data-target="tab-advanced" data-i18n="tab_advanced">Advanced Search</button>
            <button class="tab-btn" data-target="tab-contributors" data-i18n="tab_contributors">Contributors</button>
          </div>

          <div id="general-search-sidebar" class="sidebar-section active">
            <div class="search-box">
              <input type="text" id="general-query" data-i18n-placeholder="search_placeholder"
                placeholder="Search all fields (e.g., name, place, date)..." />
              <button id="btn-general-search" data-i18n="search_btn">Search</button>
            </div>
          </div>

          <div id="advanced-search-sidebar" class="sidebar-section">
            <div class="search-box" id="adv-search-controls">
              <!-- Controls injected by JS -->
            </div>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
