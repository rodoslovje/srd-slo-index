<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slovenian Genealogical Index</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div id="search-overlay" class="search-overlay" style="display: none;">
      <div class="spinner"></div>
      <div class="search-overlay-text" data-i18n="searching">Searching...</div>
    </div>
    <div class="container">
      <header>
        <h1>Slovenian Genealogical Index</h1>
        <nav id="top-nav">
          <div class="nav-title">
            <a href="/" data-i18n="site_title">Slovenian Genealogical Index</a>
          </div>
          <div class="header-nav">
            <button class="tab-btn active" data-target="tab-general" data-i18n="tab_search">Search</button>
            <button class="tab-btn" data-target="tab-birth" data-i18n="tab_birth">Birth</button>
            <button class="tab-btn" data-target="tab-family" data-i18n="tab_family">Family</button>
            <button class="tab-btn" data-target="tab-death" data-i18n="tab_death">Death</button>
            <button class="tab-btn" data-target="tab-contributors" data-i18n="tab_contributors">Genealogists</button>
          </div>
          <div class="lang-switcher" id="lang-switcher">
            <button class="lang-toggle nav-icon-btn" id="lang-toggle" aria-label="Select language">
              <span class="lang-flag">🇬🇧</span>
              <span class="lang-code">EN</span>
              <span class="lang-arrow">▾</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
              <!-- Buttons generated dynamically by initI18n() from site config -->
            </div>
          </div>
          <button class="hamburger-btn nav-icon-btn" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </nav>
      </header>

      <div class="content-area">
        <main id="main-content">
          <div id="loading" class="loading" data-i18n="loading">Loading genealogical data...</div>

          <section id="tab-general" class="tab-content active">
            <div id="intro-general" class="intro-text"></div>
            <div id="general-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_births">Birth</span> (<span id="count-general-births">0</span>)</h2>
              <div class="table-responsive" id="table-general-births"></div>
              <h2><span data-i18n="results_families">Family</span> (<span id="count-general-families">0</span>)</h2>
              <div class="table-responsive" id="table-general-families"></div>
              <h2><span data-i18n="results_deaths">Death</span> (<span id="count-general-deaths">0</span>)</h2>
              <div class="table-responsive" id="table-general-deaths"></div>
            </div>
          </section>

          <section id="tab-birth" class="tab-content">
            <div id="intro-birth" class="intro-text"></div>
            <div id="birth-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_births">Birth</span> (<span id="count-birth-results">0</span>)</h2>
              <div class="table-responsive" id="table-birth-results"></div>
            </div>
          </section>

          <section id="tab-family" class="tab-content">
            <div id="intro-family" class="intro-text"></div>
            <div id="family-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_families">Family</span> (<span id="count-family-results">0</span>)</h2>
              <div class="table-responsive" id="table-family-results"></div>
            </div>
          </section>

          <section id="tab-death" class="tab-content">
            <div id="intro-death" class="intro-text"></div>
            <div id="death-results" class="results-container" style="display: none;">
              <h2><span data-i18n="results_deaths">Death</span> (<span id="count-death-results">0</span>)</h2>
              <div class="table-responsive" id="table-death-results"></div>
            </div>
          </section>

          <section id="tab-contributors" class="tab-content">
            <div id="totals-bar" class="totals-bar" style="display:none;">
              <span><span data-i18n="tab_contributors">Genealogists</span>: <strong id="total-contributors">…</strong></span>
              <span><span data-i18n="col_total_births">Birth</span>: <strong id="total-births">…</strong></span>
              <span><span data-i18n="col_total_families">Family</span>: <strong id="total-families">…</strong></span>
              <span><span data-i18n="col_total_deaths">Death</span>: <strong id="total-deaths">…</strong></span>
              <span><span data-i18n="col_total">Total</span>: <strong id="total-all">…</strong></span>
              <span><span data-i18n="col_total_links">Links</span>: <strong id="total-links">…</strong></span>
              <span><span data-i18n="col_last_update">Last update</span>: <strong id="total-last-update">…</strong></span>
            </div>
            <div class="charts-container" id="charts-container" style="display:none;">
              <div class="chart-wrapper">
                <canvas id="contributorsChart"></canvas>
              </div>
              <div class="chart-wrapper">
                <canvas id="timelineChart"></canvas>
              </div>
            </div>
            <div class="surname-cloud-section" id="surname-cloud-section">
              <div class="surname-cloud" id="surname-cloud" data-i18n-title="chart_surnames_title"></div>
            </div>
            <div class="table-responsive" id="table-contributors"></div>
          </section>
        </main>

        <aside id="sidebar">
          <div class="sidebar-nav">
            <button class="tab-btn active" data-target="tab-general" data-i18n="tab_search">Search</button>
            <button class="tab-btn" data-target="tab-birth" data-i18n="tab_birth">Birth</button>
            <button class="tab-btn" data-target="tab-family" data-i18n="tab_family">Family</button>
            <button class="tab-btn" data-target="tab-death" data-i18n="tab_death">Death</button>
            <button class="tab-btn" data-target="tab-contributors" data-i18n="tab_contributors">Genealogists</button>
          </div>

          <div id="general-search-sidebar" class="sidebar-section active">
            <div id="general-search-controls" class="search-box"></div>
          </div>

          <div id="birth-search-sidebar" class="sidebar-section">
            <div class="search-box" id="birth-search-controls">
              <!-- Controls injected by JS -->
            </div>
          </div>

          <div id="family-search-sidebar" class="sidebar-section">
            <div class="search-box" id="family-search-controls">
              <!-- Controls injected by JS -->
            </div>
          </div>

          <div id="death-search-sidebar" class="sidebar-section">
            <div class="search-box" id="death-search-controls">
              <!-- Controls injected by JS -->
            </div>
          </div>

          <div id="contributors-search-sidebar" class="sidebar-section">
            <div class="search-box">
              <input type="text" id="contributors-query" data-i18n-placeholder="contributors_filter_placeholder" placeholder="Filter genealogist surname..." />
            </div>
          </div>
        </aside>
      </div>
    </div>
    <footer class="app-footer">
      <span><span data-i18n="footer_version">Version</span>: <span id="build-time"></span></span>
      <span><span data-i18n="footer_data_update">Data update</span>: <span id="data-updated"></span></span>
      <span class="footer-spacer"></span>
      <a class="footer-link" href="https://github.com/rodoslovje/genealogical-index" target="_blank" rel="noopener noreferrer">GitHub</a>
    </footer>
    <script type="module" src="/main.js"></script>
  </body>
</html>
